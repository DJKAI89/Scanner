name: AI Retrain

on:
  workflow_dispatch:
  schedule:
    - cron: "45 12 * * 1-5"

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run AI retrainer
        env:
          GH_TOKEN: ${{ secrets.AI_GH_TOKEN }}
          GH_USER: ${{ secrets.AI_GH_USER }}
          GH_REPO: ${{ secrets.AI_GH_REPO }}
          AI_LOOKBACK_DAYS: ${{ vars.AI_LOOKBACK_DAYS || '90' }}
          NODE_OPTIONS: "--max-old-space-size=2048"
        run: npm run ai:train